<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Deep Midnight Dark to Indigo -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    
    <!-- Accent Gradient: Gold to Amber -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Blue Gradient: Cyan to Blue -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Rounded Shield Card (Classy 3D Look) -->
  <rect x="16" y="16" width="480" height="480" rx="140" fill="url(#bgGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="8" />

  <!-- Inner Soft Blue Glow Radial -->
  <circle cx="256" cy="256" r="160" fill="url(#blueGrad)" opacity="0.15" filter="url(#glow)" />

  <!-- The Classy Bag Silhouette -->
  <!-- Bag Handle -->
  <path d="M192 190 V140 C192 104.6 220.6 76 256 76 C291.4 76 320 104.6 320 140 V190" 
        fill="none" stroke="url(#goldGrad)" stroke-width="24" stroke-linecap="round" />

  <!-- Bag Main Body -->
  <path d="M128 190 H384 L360 410 H152 Z" 
        fill="url(#blueGrad)" filter="url(#glow)" opacity="0.9" />

  <!-- Gold Accent Line across the Bag -->
  <path d="M128 190 H384" stroke="url(#goldGrad)" stroke-width="12" />

  <!-- Classy "S E" Monogram in the Center of the Bag -->
  <!-- Letter S (Golden) -->
  <path d="M236 250 C210 250 210 280 236 290 C262 300 262 330 236 330 C210 330 210 310 210 310" 
        fill="none" stroke="url(#goldGrad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Letter E (White/Silver) -->
  <path d="M302 250 H270 V330 H302 M270 290 H296" 
        fill="none" stroke="#f8fafc" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Little Sparkle Star (Classy highlight) -->
  <path d="M360 140 L366 155 L381 155 L369 165 L373 180 L360 170 L347 180 L351 165 L339 155 L354 155 Z" 
        fill="url(#goldGrad)" />
</svg>